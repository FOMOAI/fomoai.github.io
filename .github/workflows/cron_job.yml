name: Update AI News

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# This clears the warning by explicitly allowing the runner to bridge the Node versions
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests python-dateutil

      - name: Fetch news
        run: python assets/news_fetcher.py

      - name: Embed JSON into HTML
        run: |
          python -c "
          import json
          with open('articles.json', 'r') as f:
              data = f.read()
          with open('index.html', 'r') as f:
              html = f.read()
          html = html.replace('__ARTICLES_JSON__', data)
          with open('index.html', 'w') as f:
              f.write(html)
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html articles.json
          git diff --staged --quiet || (git commit -m "🤖 Update news [skip ci]" && git push)