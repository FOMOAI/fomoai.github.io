name: 15 min Python Script

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

# This clears the warning by explicitly allowing the runner to bridge the Node versions
env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Execute Python script
        run: python assets/news_fetcher.py
