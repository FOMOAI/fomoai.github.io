name: Update AI News

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests python-dateutil

      - name: Ensure assets directory exists
        run: mkdir -p assets

      - name: Fetch news
        run: python assets/news_fetcher.py

      - name: Embed JSON into HTML
        run: |
          python -c "
          import json
          with open('assets/articles.json', 'r') as f:
              data = f.read()
          with open('index.html', 'r') as f:
              html = f.read()
          html = html.replace('__ARTICLES_JSON__', data)
          with open('index.html', 'w') as f:
              f.write(html)
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          # Ensure we are on the correct branch
          BRANCH="${GITHUB_REF#refs/heads/}"
          git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"

          # Remove the old root file from Git tracking (if it exists)
          git rm --ignore-unmatch articles.json

          # Stage the new files
          git add index.html assets/articles.json

          # Commit only if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Update news [skip ci]"

            # Pull latest changes with rebase (fail loudly if conflicts arise)
            git pull --rebase origin "$BRANCH"

            git push origin "$BRANCH"
          fi