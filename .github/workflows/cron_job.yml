name: Update AI News

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write 

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser requests python-dateutil

      - name: Fetch news
        run: python assets/news_fetcher.py

      - name: Embed JSON into HTML
        run: |
          python -c "
          import json
          with open('articles.json', 'r') as f:
              data = f.read()
          with open('index.html', 'r') as f:
              html = f.read()
          html = html.replace('__ARTICLES_JSON__', data)
          with open('index.html', 'w') as f:
              f.write(html)
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/${{ github.repository }}.git

          # Ensure we are on the correct branch (adjust if needed)
          BRANCH="${GITHUB_REF#refs/heads/}"
          git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"

          git add index.html articles.json
          if ! git diff --staged --quiet; then
            git commit -m "🤖 Update news [skip ci]"
            # Pull latest changes before pushing
            git pull --rebase origin "$BRANCH" || true  # or handle conflict
            git push origin "$BRANCH"
          fi